      <div class="section-header">
        <h3>Admin Conversations</h3>
        <p style="font-size:13px;color:#6b7280;margin:4px 0 0;">Support requests and feedback from users. <span style="display:inline-flex;align-items:center;gap:6px;"><span style="background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:9999px;padding:1px 7px;font-size:11px;font-weight:600;"><i class="fa-solid fa-headset"></i> Support</span> <span style="background:#fef3c7;color:#b45309;border:1px solid #fde68a;border-radius:9999px;padding:1px 7px;font-size:11px;font-weight:600;"><i class="fa-solid fa-comment-dots"></i> Feedback</span></span></p>
      </div>

      <div class="admin-messages-list" id="adminMessagesList">
        <div class="admin-messages-loading" id="adminMessagesLoading">
          <i class="fa-solid fa-spinner fa-spin"></i>
          <span>Loading conversations...</span>
        </div>
      </div>

      <!-- Empty state -->
      <div class="admin-messages-empty" id="adminMessagesEmpty" style="display: none;">
        <div class="empty-state-icon">
          <i class="fa-solid fa-message"></i>
        </div>
        <h3>No Conversations</h3>
        <p>Direct messages from users will appear here. Use the "Message" button on the Users tab to start a conversation.</p>
      </div>

      <!-- Inline thread panel (shown when a conversation is selected) -->
      <div id="adminThreadPanel" style="display:none; margin-top:16px; border:1px solid #e5e7eb; border-radius:12px; overflow:hidden;">
        <div id="adminThreadHeader" style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#f9fafb;border-bottom:1px solid #e5e7eb;">
          <button onclick="closeAdminThread()" style="background:none;border:none;cursor:pointer;color:#6b7280;font-size:18px;" title="Back">&#8592;</button>
          <span id="adminThreadUsername" style="font-size:15px;font-weight:600;color:#0f172a;"></span>
        </div>
        <div id="adminThreadHistory" style="display:flex;flex-direction:column;gap:8px;max-height:360px;overflow-y:auto;padding:16px;background:#f8fafc;"></div>
        <div style="padding:12px 16px;background:#ffffff;border-top:1px solid #e5e7eb;">
          <form id="adminReplyForm" style="display:flex;gap:8px;align-items:center;">
            <input id="adminReplyInput" type="text" placeholder="Reply…"
                   style="flex:1;padding:8px 14px;border:1px solid #e2e8f0;border-radius:9999px;font-size:13px;outline:none;" />
            <button type="submit"
                    style="padding:8px 18px;background:#3b82f6;color:#fff;border:none;border-radius:9999px;font-size:13px;font-weight:600;cursor:pointer;">
              Send
            </button>
          </form>
        </div>
      </div>

<script>
(function() {
  let activeUserId = null;

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function timeSince(ts) {
    if (!ts) return '';
    const d = new Date(ts.replace(' ','T'));
    const diff = (Date.now() - d) / 1000;
    if (diff < 60)   return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return d.toLocaleDateString();
  }

  function loadConversations() {
    fetch('/admin/api/conversations')
      .then(r => r.json())
      .then(data => {
        document.getElementById('adminMessagesLoading').style.display = 'none';
        const list = document.getElementById('adminMessagesList');
        const empty = document.getElementById('adminMessagesEmpty');

        if (!data.success || !data.conversations || data.conversations.length === 0) {
          empty.style.display = '';
          return;
        }

        data.conversations.forEach(convo => {
          const isFeedback = convo.conversation_type === 'feedback';
          const card = document.createElement('div');
          card.className = 'admin-conversation-card' +
            (convo.unread_count > 0 ? ' has-unread' : '') +
            (isFeedback ? ' is-feedback' : '');
          card.dataset.userId = convo.other_user_id;
          const initials = (convo.other_username || '??').slice(0, 2).toUpperCase();
          card.innerHTML = `
            <div class="admin-convo-avatar${isFeedback ? ' feedback-avatar' : ''}">${escHtml(initials)}</div>
            <div class="admin-convo-content">
              <div class="admin-convo-header">
                <span class="admin-convo-username">@${escHtml(convo.other_username)}</span>
                ${isFeedback ? '<span class="admin-convo-type-badge feedback-badge"><i class="fa-solid fa-comment-dots"></i> Feedback</span>' : '<span class="admin-convo-type-badge support-badge"><i class="fa-solid fa-headset"></i> Support</span>'}
                <span class="admin-convo-time">${escHtml(timeSince(convo.last_message_time))}</span>
              </div>
              <div class="admin-convo-preview">${escHtml(convo.last_message_content || '')}</div>
            </div>
            ${convo.unread_count > 0 ? `<div class="admin-convo-unread">${convo.unread_count}</div>` : ''}
          `;
          card.addEventListener('click', () => openThread(convo.other_user_id, convo.other_username));
          list.appendChild(card);
        });
      })
      .catch(() => {
        document.getElementById('adminMessagesLoading').style.display = 'none';
      });
  }

  function openThread(userId, username) {
    activeUserId = userId;
    document.getElementById('adminThreadUsername').textContent = '@' + username;
    document.getElementById('adminThreadPanel').style.display = '';
    const history = document.getElementById('adminThreadHistory');
    history.innerHTML = '<div style="color:#6b7280;font-size:13px;">Loading…</div>';

    fetch(`/admin/api/user/${userId}/messages`)
      .then(r => r.json())
      .then(data => {
        history.innerHTML = '';
        if (!data.success || !data.messages || data.messages.length === 0) {
          history.innerHTML = '<div style="color:#9ca3af;font-size:13px;text-align:center;">No messages yet.</div>';
          return;
        }
        data.messages.forEach(msg => {
          const div = document.createElement('div');
          const isAdmin = msg.is_admin;
          div.style.cssText = `max-width:70%;display:flex;flex-direction:column;gap:2px;align-self:${isAdmin ? 'flex-end' : 'flex-start'};align-items:${isAdmin ? 'flex-end' : 'flex-start'};`;
          div.innerHTML = `
            <div style="padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.4;
                        ${isAdmin ? 'background:#3b82f6;color:#fff;border-bottom-right-radius:4px;'
                                  : 'background:#fff;border:1px solid #e2e8f0;color:#0f172a;border-bottom-left-radius:4px;'}">
              ${escHtml(msg.content)}
            </div>
            <div style="font-size:11px;color:#94a3b8;">${escHtml(msg.timestamp || '')}</div>
          `;
          history.appendChild(div);
        });
        history.scrollTop = history.scrollHeight;
        // Mark read by removing unread indicator on card
        const card = document.querySelector(`.admin-conversation-card[data-user-id="${userId}"]`);
        if (card) {
          card.classList.remove('has-unread');
          const badge = card.querySelector('.admin-convo-unread');
          if (badge) badge.remove();
        }
      });
  }

  window.closeAdminThread = function() {
    document.getElementById('adminThreadPanel').style.display = 'none';
    activeUserId = null;
  };

  document.getElementById('adminReplyForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if (!activeUserId) return;
    const input = document.getElementById('adminReplyInput');
    const text = input.value.trim();
    if (!text) return;

    fetch(`/admin/api/user/${activeUserId}/message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        const history = document.getElementById('adminThreadHistory');
        const div = document.createElement('div');
        div.style.cssText = 'max-width:70%;display:flex;flex-direction:column;gap:2px;align-self:flex-end;align-items:flex-end;';
        div.innerHTML = `
          <div style="padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.4;background:#3b82f6;color:#fff;border-bottom-right-radius:4px;">
            ${escHtml(text)}
          </div>
          <div style="font-size:11px;color:#94a3b8;">${new Date().toLocaleString()}</div>
        `;
        history.appendChild(div);
        history.scrollTop = history.scrollHeight;
        input.value = '';
        // Update preview on card
        const card = document.querySelector(`.admin-conversation-card[data-user-id="${activeUserId}"]`);
        if (card) {
          const preview = card.querySelector('.admin-convo-preview');
          if (preview) preview.textContent = text;
        }
      } else {
        alert(data.error || 'Failed to send.');
      }
    })
    .catch(() => alert('Network error.'));
  });

  // Load on tab show
  document.addEventListener('DOMContentLoaded', loadConversations);
  // Also trigger if tab is already visible when script runs
  if (document.readyState !== 'loading') loadConversations();
})();
</script>
