      <!-- Default Platform Fee Setting -->
      <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px 24px;margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
          <div style="width:36px;height:36px;border-radius:8px;background:#eff6ff;display:flex;align-items:center;justify-content:center;">
            <i class="fa-solid fa-percent" style="color:#3b82f6;font-size:15px;"></i>
          </div>
          <div>
            <div style="font-size:15px;font-weight:600;color:#0f172a;">Default Platform Fee</div>
            <div style="font-size:12px;color:#6b7280;margin-top:1px;">Applied to all buckets without a custom fee</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <input id="defaultFeeInput" type="number" min="0" max="100" step="0.1"
                 style="width:120px;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;color:#0f172a;outline:none;"
                 placeholder="e.g. 5.0" />
          <span style="font-size:14px;color:#374151;">%</span>
          <button onclick="saveDefaultFee()"
                  style="padding:8px 18px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">
            Save
          </button>
          <span id="defaultFeeStatus" style="font-size:13px;color:#16a34a;display:none;"></span>
        </div>
      </div>

      <!-- Bucket Stats -->
      <div class="stats-grid stats-grid-4">
        <div class="stat-card">
          <div class="stat-card-header">
            <span class="stat-label">Total Buckets</span>
            <div class="stat-icon stat-icon-purple">
              <i class="fa-solid fa-layer-group"></i>
            </div>
          </div>
          <div class="stat-value" id="bucketStatTotal">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-header">
            <span class="stat-label">Custom Fees</span>
            <div class="stat-icon stat-icon-blue">
              <i class="fa-solid fa-percent"></i>
            </div>
          </div>
          <div class="stat-value" id="bucketStatCustomFees">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-header">
            <span class="stat-label">Active Listings</span>
            <div class="stat-icon stat-icon-green">
              <i class="fa-solid fa-tags"></i>
            </div>
          </div>
          <div class="stat-value" id="bucketStatListings">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-header">
            <span class="stat-label">Active Bids</span>
            <div class="stat-icon stat-icon-gold">
              <i class="fa-solid fa-gavel"></i>
            </div>
          </div>
          <div class="stat-value" id="bucketStatBids">-</div>
        </div>
      </div>

      <!-- Bucket Filters -->
      <div class="panel-toolbar">
        <div class="search-filter-group">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search buckets..." id="bucketSearch">
          </div>
          <select class="filter-select" id="bucketMetalFilter">
            <option value="">All Metals</option>
          </select>
        </div>
        <div class="toolbar-actions">
          <button class="toolbar-btn toolbar-btn-danger" id="bucketDeleteSelectedBtn" onclick="deleteSelectedBuckets()" style="display:none;">
            <i class="fa-solid fa-trash"></i> Delete Selected (<span id="bucketSelectedCount">0</span>)
          </button>
          <button class="toolbar-btn" onclick="loadBuckets()">
            <i class="fa-solid fa-rotate"></i> Refresh
          </button>
        </div>
      </div>

      <div class="section-header">
        <h3>Product Buckets</h3>
        <span class="section-subtitle" id="bucketCountDisplay">Loading...</span>
      </div>

      <div class="data-table-container">
        <table class="data-table" id="bucketsTable">
          <thead>
            <tr>
              <th style="width:36px;">
                <input type="checkbox" id="bucketSelectAll" title="Select all" onchange="toggleSelectAllBuckets(this.checked)" style="cursor:pointer;">
              </th>
              <th>Bucket ID</th>
              <th>Name / Spec</th>
              <th>Metal</th>
              <th>Active Listings</th>
              <th>Active Bids</th>
              <th>Platform Fee</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="bucketsTableBody">
            <tr>
              <td colspan="8" style="text-align: center; color: #6b7280; padding: 40px;">
                <i class="fa-solid fa-spinner fa-spin"></i> Loading buckets...
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Bucket Pagination -->
      <div class="ledger-pagination" id="bucketPagination">
        <button class="toolbar-btn" id="bucketPrevBtn" onclick="bucketPrevPage()" disabled>
          <i class="fa-solid fa-chevron-left"></i> Previous
        </button>
        <span class="pagination-info" id="bucketPageInfo">Page 1</span>
        <button class="toolbar-btn" id="bucketNextBtn" onclick="bucketNextPage()">
          Next <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>

<script>
(function() {
  function loadDefaultFee() {
    fetch('/admin/api/system-settings/default-fee')
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          document.getElementById('defaultFeeInput').value = data.fee_value;
        }
      })
      .catch(() => {});
  }

  window.saveDefaultFee = function() {
    const input = document.getElementById('defaultFeeInput');
    const status = document.getElementById('defaultFeeStatus');
    const val = parseFloat(input.value);
    if (isNaN(val) || val < 0 || val > 100) {
      status.style.color = '#dc2626';
      status.textContent = 'Enter a value between 0 and 100.';
      status.style.display = '';
      return;
    }
    fetch('/admin/api/system-settings/default-fee', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fee_type: 'percent', fee_value: val })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        status.style.color = '#16a34a';
        status.textContent = 'Saved!';
      } else {
        status.style.color = '#dc2626';
        status.textContent = data.message || 'Error saving.';
      }
      status.style.display = '';
      setTimeout(() => { status.style.display = 'none'; }, 3000);
    })
    .catch(() => {
      status.style.color = '#dc2626';
      status.textContent = 'Network error.';
      status.style.display = '';
    });
  };

  document.addEventListener('DOMContentLoaded', loadDefaultFee);
  if (document.readyState !== 'loading') loadDefaultFee();
})();
</script>
