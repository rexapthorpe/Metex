<!-- Listing Items Modal - Shows item details for listings -->
<div id="listingItemsModal" class="listing-items-modal-overlay" style="display: none;">
  <div class="listing-items-modal-content" role="dialog" aria-modal="true" aria-labelledby="listingItemsModalTitle">
    <!-- Close button (unified style) -->
    <button type="button" class="modal-close" onclick="closeListingItemsModal()" aria-label="Close modal">&times;</button>

    <!-- Header -->
    <div class="lim-header">
      <div class="lim-header-icon">
        <i class="fa-solid fa-box-open"></i>
      </div>
      <div class="lim-header-text">
        <h3 id="listingItemsModalTitle" class="lim-title">Listing Details</h3>
        <p id="listingItemsModalSubtitle" class="lim-subtitle">Loading...</p>
      </div>
    </div>

    <!-- Body - populated by JS -->
    <div id="listingItemsModalContent" class="lim-body">
      <div class="lim-loading">
        <i class="fa-solid fa-spinner fa-spin"></i>
        Loading details...
      </div>
    </div>

    <!-- Footer -->
    <div id="listingItemsModalFooter" class="lim-footer">
      <!-- Populated by JS -->
    </div>
  </div>
</div>
