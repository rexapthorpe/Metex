
<div id="messageModal" class="modal" style="display: none;">
  <div class="modal-content message-modal">

    <!-- Header: Avatar + Name/Handle + Actions -->
    <div class="msg-header">
      <div class="msg-avatar" id="msgAvatar">??</div>
      <div class="msg-header-center">
        <div class="msg-header-nav">
          <button class="nav-arrow" id="prevSeller" style="display:none">&#8249;</button>
          <div class="msg-header-identity">
            <div class="msg-name" id="msgHeaderName">Seller</div>
            <div class="msg-handle" id="msgHeaderHandle">@seller</div>
          </div>
          <button class="nav-arrow" id="nextSeller" style="display:none">&#8250;</button>
        </div>
      </div>
      <div class="msg-header-right">
        <button class="msg-menu-btn" aria-label="More options">
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </button>
        <button class="msg-close-btn" onclick="closeMessageModal()" aria-label="Close">&times;</button>
      </div>
    </div>

    <!-- Order context bar -->
    <div class="msg-order-bar" id="msgOrderBar">
      <div class="msg-order-img">
        <img src="/static/img/placeholder.png" alt="Order item">
      </div>
      <div class="msg-order-details">
        <div class="msg-order-title" id="msgOrderTitle">Order Item</div>
        <div class="msg-order-id" id="msgOrderId">Order #ORD-0000</div>
      </div>
      <button class="msg-view-order-btn" id="msgViewOrderBtn" type="button">View Order</button>
    </div>

    <!-- Conversation indicator (multi-seller) -->
    <div id="conversationIndicator" class="seller-indicator" style="display:none"></div>

    <!-- Message body -->
    <div class="message-body" id="messageBody"></div>

    <!-- Input area -->
    <div class="message-input">
      <div class="msg-tool-btns">
        <button class="msg-tool-btn" id="msgPaperclipBtn" type="button" aria-label="Attach image">
          <i class="fa-solid fa-paperclip"></i>
        </button>
      </div>
      <input type="file" id="msgImageInput" accept="image/*" style="display:none">
      <div class="msg-input-wrap">
        <div id="msgImagePreview" class="msg-image-preview" style="display:none">
          <img id="msgImagePreviewImg" src="" alt="Preview">
          <button class="msg-image-preview-remove" id="msgImagePreviewRemove" type="button" aria-label="Remove image">&times;</button>
        </div>
        <textarea id="messageInput" class="msg-textarea" placeholder="Type a message..." rows="1"></textarea>
      </div>
      <button id="sendMessageBtn" class="message-send-btn" type="button">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
    <div class="msg-hint">Press Enter to send &bull; Shift+Enter for new line</div>

  </div>
</div>
