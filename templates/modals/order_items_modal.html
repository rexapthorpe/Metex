<div id="orderItemsModal" class="order-items-modal-overlay" style="display: none;">
  <div class="order-items-modal-content" role="dialog" aria-modal="true" aria-labelledby="oimTitle">
    <button type="button" class="modal-close" onclick="closeOrderItemsPopup()" aria-label="Close modal">&times;</button>

    <!-- Header: icon + title + order subtitle -->
    <div class="oim-header">
      <div class="oim-header-icon"><i class="fa-solid fa-cube"></i></div>
      <div class="oim-header-text">
        <h3 id="oimTitle" class="oim-header-title">Order Items</h3>
        <p id="orderItemsModalSubtitle" class="oim-header-subtitle"></p>
      </div>
    </div>

    <!-- Content: filled by JS -->
    <div id="orderItemsModalContent" class="order-items-modal-body"></div>
  </div>
</div>
