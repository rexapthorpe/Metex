{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/modals/confirmation_modal_base.css') }}">

{% include 'modals/error_notification_modal.html' %}

<div class="login-page">
  <div id="bg-animated" class="bg-animated" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="header-spacer"></div>

  <main class="auth-shell" role="main">
    <section class="auth-card signup-mode" style="height:auto; width:min(440px,92vw);">
      <div class="panes" style="grid-template-columns:1fr;">
        <div class="pane pane-login">

          <div class="brand">
            <div class="logo-circle">M</div>
          </div>
          <h1 class="title" style="text-align:center;">Reset Password</h1>
          <p class="subtitle" style="text-align:center;">Choose a new password for your account.</p>

          <form class="login-form" id="resetPasswordForm" method="POST" action="">

            <div class="form-row">
              <div class="label-row">
                <label for="password">New Password</label>
                <button class="ghost" type="button" id="togglePassword" aria-pressed="false">Show</button>
              </div>
              <input id="password" name="password" type="password" placeholder="New password" required
                     autocomplete="new-password">
            </div>

            <!-- Live password requirements checklist -->
            <ul class="pw-checklist" aria-label="Password requirements">
              <li id="req-length" class="pw-req pw-req--unmet">
                <span class="pw-req-icon">○</span> At least 8 characters
              </li>
              <li id="req-match" class="pw-req pw-req--unmet">
                <span class="pw-req-icon">○</span> Passwords match
              </li>
            </ul>

            <div class="form-row">
              <div class="label-row">
                <label for="confirm_password">Confirm Password</label>
                <button class="ghost" type="button" id="toggleConfirmPassword" aria-pressed="false">Show</button>
              </div>
              <input id="confirm_password" name="confirm_password" type="password"
                     placeholder="Confirm password" required autocomplete="new-password">
            </div>

            <button class="primary-btn" type="submit" id="resetBtn">Reset Password</button>
          </form>

          <p class="swap-cta" style="text-align:center; margin-top:16px;">
            <a class="link" href="{{ url_for('auth.login') }}">← Back to Login</a>
          </p>

        </div>
      </div>
    </section>
  </main>
</div>

<script src="{{ url_for('static', filename='js/modals/error_notification_modal.js') }}"></script>
<script>
(function () {
  const pwd     = document.getElementById('password');
  const pwd2    = document.getElementById('confirm_password');
  const btn     = document.getElementById('togglePassword');
  const btn2    = document.getElementById('toggleConfirmPassword');
  const form    = document.getElementById('resetPasswordForm');
  const resetBtn = document.getElementById('resetBtn');

  // Show/Hide toggles
  function makeToggle(input, button) {
    if (!input || !button) return;
    button.addEventListener('click', function () {
      const hidden = input.type === 'password';
      input.type = hidden ? 'text' : 'password';
      button.textContent = hidden ? 'Hide' : 'Show';
      button.setAttribute('aria-pressed', String(hidden));
    });
  }
  makeToggle(pwd, btn);
  makeToggle(pwd2, btn2);

  // Live checklist
  function setReq(id, met) {
    const el = document.getElementById(id);
    if (!el) return;
    const icon = el.querySelector('.pw-req-icon');
    el.classList.toggle('pw-req--met', met);
    el.classList.toggle('pw-req--unmet', !met);
    if (icon) icon.textContent = met ? '✓' : '○';
  }

  function updateChecklist() {
    const val     = pwd  ? pwd.value  : '';
    const confirm = pwd2 ? pwd2.value : '';
    setReq('req-length', val.length >= 8);
    setReq('req-match',  val.length > 0 && val === confirm);
  }

  if (pwd)  pwd.addEventListener('input',  updateChecklist);
  if (pwd2) pwd2.addEventListener('input', updateChecklist);
  updateChecklist();

  // AJAX form submission
  if (form) {
    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const pwVal      = pwd  ? pwd.value  : '';
      const confirmVal = pwd2 ? pwd2.value : '';

      // Client-side validation
      if (pwVal.length < 8) {
        openErrorNotificationModal('Password must be at least 8 characters.', 'Invalid Password');
        return;
      }
      if (pwVal !== confirmVal) {
        openErrorNotificationModal('Passwords do not match.', 'Passwords Don\'t Match');
        return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = 'Resetting…';

      const formData = new FormData(form);

      fetch(window.location.pathname, {
        method: 'POST',
        body: formData,
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
      })
      .then(function (resp) { return resp.json(); })
      .then(function (data) {
        if (data.success) {
          window.location.href = '{{ url_for("auth.login") }}';
        } else {
          openErrorNotificationModal(data.error || 'Something went wrong.', 'Reset Failed');
          resetBtn.disabled = false;
          resetBtn.textContent = 'Reset Password';
        }
      })
      .catch(function () {
        openErrorNotificationModal('Network error. Please try again.', 'Reset Failed');
        resetBtn.disabled = false;
        resetBtn.textContent = 'Reset Password';
      });
    });
  }
})();
</script>
{% endblock %}
