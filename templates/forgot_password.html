{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

<style>
/* ── Forgot password success state ── */
.fp-success {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 8px 0 16px;
  text-align: center;
}
.fp-success.active { display: flex; }

.fp-checkmark svg {
  width: 80px;
  height: 80px;
}
.fp-checkmark-circle {
  stroke: #22c55e;
  stroke-width: 2.5;
  stroke-dasharray: 151;
  stroke-dashoffset: 151;
  fill: none;
  animation: fp-draw 0.55s cubic-bezier(0.65, 0, 0.45, 1) 0.1s forwards;
}
.fp-checkmark-check {
  stroke: #22c55e;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 36;
  stroke-dashoffset: 36;
  fill: none;
  animation: fp-draw 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.65s forwards;
}
@keyframes fp-draw { to { stroke-dashoffset: 0; } }

.fp-success-title {
  font-size: 1.4rem;
  font-weight: 700;
  color: #0f172a;
  margin: 0;
  opacity: 0;
  animation: fp-fade-up 0.35s ease 0.75s forwards;
}
.fp-success-sub {
  font-size: 0.9rem;
  color: #64748b;
  margin: 0;
  opacity: 0;
  animation: fp-fade-up 0.35s ease 0.95s forwards;
}
.fp-login-btn {
  opacity: 0;
  animation: fp-fade-up 0.35s ease 1.15s forwards;
  margin-top: 4px;
}
@keyframes fp-fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Inline error banner */
.fp-error-banner {
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 12px;
  font-size: 14px;
  background: #fef2f2;
  color: #991b1b;
  border: 1px solid #fecaca;
  display: none;
}
.fp-error-banner.active { display: block; }
</style>

<div class="login-page">
  <div id="bg-animated" class="bg-animated" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="header-spacer"></div>

  <main class="auth-shell" role="main">
    <section class="auth-card signup-mode" style="height:auto; width:min(420px,92vw);">
      <div class="panes" style="grid-template-columns:1fr;">
        <div class="pane pane-login">

          <div class="brand">
            <div class="logo-circle">M</div>
          </div>

          <!-- Form state -->
          <div id="fp-form-state">
            <h1 class="title" style="text-align:center;">Forgot Password</h1>
            <p class="subtitle" style="text-align:center;">Enter your username and email and we'll send you a reset link.</p>

            <div id="fp-error" class="fp-error-banner" role="alert"></div>

            <form id="fp-form" class="login-form">
              <div class="form-row">
                <label for="fp-username">Username</label>
                <input id="fp-username" name="username" type="text" placeholder="your_username" required
                       autocomplete="username" spellcheck="false">
              </div>
              <div class="form-row">
                <label for="fp-email">Email address</label>
                <input id="fp-email" name="email" type="email" placeholder="you@example.com" required
                       autocomplete="email" inputmode="email">
              </div>
              <button id="fp-submit" class="primary-btn" type="submit">Send Reset Link</button>
            </form>

            <p class="swap-cta" style="text-align:center; margin-top:16px;">
              <a class="link" href="{{ url_for('auth.login') }}">← Back to Login</a>
            </p>
          </div>

          <!-- Success state (hidden until AJAX success) -->
          <div id="fp-success-state" class="fp-success">
            <div class="fp-checkmark">
              <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
                <circle class="fp-checkmark-circle" cx="26" cy="26" r="24"/>
                <polyline class="fp-checkmark-check" points="14,27 22,35 38,18"/>
              </svg>
            </div>
            <p class="fp-success-title">Link Sent!</p>
            <p class="fp-success-sub">Check your inbox — a password reset link is on its way.</p>
            <a href="{{ url_for('auth.login') }}" class="primary-btn fp-login-btn">Back to Login</a>
          </div>

        </div>
      </div>
    </section>
  </main>
</div>

<script>
(function () {
  const form     = document.getElementById('fp-form');
  const submitBtn = document.getElementById('fp-submit');
  const errorEl  = document.getElementById('fp-error');
  const formState    = document.getElementById('fp-form-state');
  const successState = document.getElementById('fp-success-state');

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add('active');
  }

  function clearError() {
    errorEl.textContent = '';
    errorEl.classList.remove('active');
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    clearError();

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';

    const body = new FormData(form);

    try {
      const resp = await fetch('/forgot_password', {
        method: 'POST',
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        body: body,
      });

      const data = await resp.json();

      if (data.success) {
        // Swap to success state
        formState.style.display = 'none';
        successState.classList.add('active');
      } else {
        showError(data.error || 'Something went wrong. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';
      }
    } catch (err) {
      showError('Network error. Please check your connection and try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Reset Link';
    }
  });
})();
</script>
{% endblock %}
