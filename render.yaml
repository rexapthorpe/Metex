services:
  - type: web
    name: metex
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: metex-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BEHIND_PROXY
        value: "true"
      - key: SECURE_COOKIES
        value: "true"
      - key: ENABLE_HSTS
        value: "true"
      # Set these manually in the Render dashboard:
      # METALPRICE_API_KEY, EMAIL_ADDRESS, EMAIL_PASSWORD,
      # GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET

databases:
  - name: metex-db
    plan: free
    databaseName: metex
    user: metex
